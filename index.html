<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ─── Primary Meta ──────────────────────────── -->
    <title>GitVerse — Explore Code as a Living Galaxy</title>
    <meta
      name="description"
      content="Transform any GitHub profile into an immersive 3D galaxy. Explore repositories as planets, navigate with a space probe, and watch commit history come alive."
    />
    <meta name="author" content="GitVerse" />
    <meta
      name="keywords"
      content="github, visualization, 3d, galaxy, repositories, developer tools"
    />

    <!-- ─── Open Graph ────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="GitVerse — Explore Code as a Living Galaxy" />
    <meta
      property="og:description"
      content="Transform any GitHub profile into an immersive 3D galaxy. Explore repositories as planets."
    />
    <meta property="og:image" content="/og-preview.png" />
    <meta property="og:url" content="https://gitverse.netlify.app" />

    <!-- ─── Twitter Card ──────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GitVerse — Explore Code as a Living Galaxy" />
    <meta
      name="twitter:description"
      content="Transform any GitHub profile into an immersive 3D galaxy."
    />
    <meta name="twitter:image" content="/og-preview.png" />

    <!-- ─── Favicon ───────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- ─── Fonts (self-hosted via Google Fonts CSS) ─ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />

    <!-- ─── Theme Color ───────────────────────────── -->
    <meta name="theme-color" content="#000814" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
